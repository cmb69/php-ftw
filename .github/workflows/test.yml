name: Build PHP
on: [push]
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
        arch: [x64]
        ts: [nts]
    runs-on: windows-2019
    steps:
      - name: Checkout php-ftw
        uses: actions/checkout@v2
      - run: powershell .github/workflows/fetch-php.ps1 -version 8.0.7 -arch x64 -ts nts
      - run: tree /a .
